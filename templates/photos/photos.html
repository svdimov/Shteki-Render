{% extends 'base.html' %}
{% load static %}
{% load i18n %}
{% block content %}


    <link rel="stylesheet" href="{% static 'css/photos.css' %}" media="screen">

    <section class="u-border-1 u-border-palette-1-base u-clearfix u-image u-section-2" id="sec-0ed1">
        <div class="u-clearfix u-sheet u-valign-top-lg u-valign-top-md u-valign-top-sm u-valign-top-xs u-sheet-1">

            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h3 class="u-text u-text-default u-text-1">{% trans 'Event photos' %}</h3>
                <div style="display: flex; align-items: center;">
                    <input type="text" id="search-input" placeholder="{% trans 'Search photos...' %}"
                           style="padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.9rem; margin-right: 6px;">
                    <button id="search-btn"
                            style="padding: 6px 12px; background-color: #f9844a; color: #fff; border: none; border-radius: 4px; cursor: pointer;">
                        {% trans 'Search' %}
                    </button>
                </div>
            </div>

            <!-- Events container -->
            <div id="events-container"></div>

            <!-- Pagination container styled as original -->
            <div id="pagination-container" class="pagination"
                 style="display: flex; justify-content: center; margin-top: 20px; gap: 8px;"></div>
        </div>
    </section>

   <script>
  const apiUrl = "{% url 'api-events' %}";
  const detailsUrlTemplate = "{% url 'photos-detail' 0 %}";

  const FALLBACK_IMG1 = "{% static 'images/452545.jpg' %}";
  const FALLBACK_IMG2 = "{% static 'images/37.jpg' %}";
  const FALLBACK_IMG3 = "{% static 'images/2133123.jpg' %}";

  // i18n strings from Django (safe)
  const TXT_NO_EVENTS = "{% trans 'No past events.' %}";
  const TXT_FIRST = "{% trans 'First' %}";
  const TXT_PREV = "{% trans 'Previous' %}";
  const TXT_NEXT = "{% trans 'Next' %}";
  const TXT_LAST = "{% trans 'Last' %}";
  const TXT_PAGE = "{% trans 'Page' %}";
  const TXT_OF = "{% trans 'of' %}";
  const TXT_MORE_INFO = "{% trans 'More info' %}";

  let currentQuery = "";
  let currentPage = 1;
  let totalPages = 1;

  const container = document.getElementById("events-container");
  const pagination = document.getElementById("pagination-container");
  const searchBtn = document.getElementById("search-btn");
  const searchInput = document.getElementById("search-input");

  searchBtn?.addEventListener("click", () => {
    currentQuery = (searchInput.value || "").trim();
    currentPage = 1;
    loadEvents();
  });

  searchInput?.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      currentQuery = (searchInput.value || "").trim();
      currentPage = 1;
      loadEvents();
    }
  });

  function buildUrl() {
    const url = new URL(apiUrl, window.location.origin);
    url.searchParams.set("page", String(currentPage));
    if (currentQuery) url.searchParams.set("q", currentQuery);
    return url.toString();
  }

  async function loadEvents() {
    try {
      const res = await fetch(buildUrl());
      const data = await res.json();

      renderEvents(Array.isArray(data.results) ? data.results : []);
      renderPagination(typeof data.count === "number" ? data.count : 0);
    } catch (err) {
      console.error("past-events load error:", err);
      renderEvents([]);
      renderPagination(0);
    }
  }

  // --------- Variant B: DOM only ----------
  function renderEvents(events) {
    container.replaceChildren();

    if (!events.length) {
      const h = document.createElement("h3");
      h.className = "center-text";
      h.textContent = TXT_NO_EVENTS;
      container.appendChild(h);
      return;
    }

    const frag = document.createDocumentFragment();

    events.forEach((event) => {
      const img1 = event.image1 && String(event.image1).trim() ? event.image1 : FALLBACK_IMG1;
      const img2 = event.image2 && String(event.image2).trim() ? event.image2 : FALLBACK_IMG2;
      const img3 = event.image3 && String(event.image3).trim() ? event.image3 : FALLBACK_IMG3;

      // keep backend url shape: /.../0/ -> /.../<id>/
      const detailUrl = detailsUrlTemplate.replace("/0/", `/${event.id}/`);

      const card = document.createElement("div");
      card.className =
        "u-align-left u-container-align-left u-container-style u-group u-palette-1-light-3 u-radius u-shape-round u-group-1";
      card.setAttribute("data-animation-name", "customAnimationIn");
      card.setAttribute("data-animation-duration", "1500");
      card.setAttribute("data-animation-delay", "0");

      const layout = document.createElement("div");
      layout.className = "u-container-layout u-container-layout-2";

      layout.appendChild(makeCircleImg(img1, event.name, "u-image-2"));
      layout.appendChild(makeCircleImg(img2, event.name, "u-image-3"));
      layout.appendChild(makeCircleImg(img3, event.name, "u-image-4"));

      const title = document.createElement("h3");
      title.className = "u-align-center u-text u-text-2";
      title.textContent = event.name || "";
      layout.appendChild(title);

      const line = document.createElement("div");
      line.className = "u-align-center u-border-3 u-border-palette-1-base u-line u-line-horizontal u-line-1";
      layout.appendChild(line);

      const a = document.createElement("a");
      a.href = detailUrl;
      a.className = "u-btn u-button-style u-hover-palette-1-dark-1 u-palette-1-base u-btn-2";
      a.textContent = TXT_MORE_INFO;
      layout.appendChild(a);

      card.appendChild(layout);
      frag.appendChild(card);
    });

    container.appendChild(frag);
  }

  function makeCircleImg(src, alt, extraClass) {
    const img = document.createElement("img");
    img.src = src;
    img.alt = alt || "";
    img.className = `u-border-2 u-border-palette-1-base u-image u-image-circle ${extraClass}`;
    img.setAttribute("data-animation-name", "customAnimationIn");
    img.setAttribute("data-animation-duration", "1500");
    img.setAttribute("data-animation-delay", "250");
    return img;
  }

  // Pagination DOM only
  function renderPagination(totalItems) {
    pagination.replaceChildren();

    const perPage = 8; // keep in sync with API
    totalPages = Math.max(1, Math.ceil(totalItems / perPage));

    if (totalPages <= 1) return;

    if (currentPage > 1) {
      pagination.appendChild(makePageLink(TXT_FIRST, 1));
      pagination.appendChild(makePageLink(TXT_PREV, currentPage - 1));
    }

    const info = document.createElement("span");
    info.textContent = `${TXT_PAGE} ${currentPage} ${TXT_OF} ${totalPages}`;
    info.style.padding = "6px 12px";
    info.style.border = "1px solid #ccc";
    info.style.borderRadius = "4px";
    pagination.appendChild(info);

    if (currentPage < totalPages) {
      pagination.appendChild(makePageLink(TXT_NEXT, currentPage + 1));
      pagination.appendChild(makePageLink(TXT_LAST, totalPages));
    }
  }

  function makePageLink(label, page) {
    const link = document.createElement("a");
    link.href = "#";
    link.textContent = label;
    link.style.padding = "6px 12px";
    link.style.border = "1px solid #ccc";
    link.style.borderRadius = "4px";
    link.style.textDecoration = "none";
    link.addEventListener("click", (e) => {
      e.preventDefault();
      gotoPage(page);
    });
    return link;
  }

  function gotoPage(page) {
    currentPage = page;
    loadEvents();
  }

  window.addEventListener("load", loadEvents);
</script>


{% endblock %}
