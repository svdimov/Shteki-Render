{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/reset_password.css' %}">

<section class="reset-password-section">
  <div class="reset-password-container">
    <h2>{% trans 'Set new password' %}</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">{% trans 'Reset password' %}</button>
    </form>
  </div>
</section>
{% endblock %}
